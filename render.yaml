services:
  - type: web
    name: knowledgebase
    runtime: docker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_SITE_NAME
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: "5000"
